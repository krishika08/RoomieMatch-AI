<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Matches — RoomieMatch AI</title>
  <meta name="description" content="View your AI-ranked roommate matches on RoomieMatch AI.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
<div class="app-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fa-solid fa-house-chimney"></i></div>
      <span class="brand-name">RoomieMatch AI</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
      <a href="profile.html"   class="nav-item"><i class="fa-solid fa-user-pen"></i> Profile</a>
      <a href="matches.html"   class="nav-item active"><i class="fa-solid fa-handshake"></i> Matches</a>
      <a href="requests.html"  class="nav-item"><i class="fa-solid fa-bell"></i> Requests</a>
      <div class="nav-divider"></div>
      <a href="#" class="nav-item nav-logout" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Sign out</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="sidebarAvatar">U</div>
        <span class="user-email" id="sidebarEmail">user@app.com</span>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header" data-aos="fade-down" data-aos-duration="400"
         style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;">
      <div>
        <h1>Your Matches</h1>
        <p>Roommates ranked by AI compatibility score — highest first.</p>
      </div>
      <button id="refreshMatchesBtn" class="btn btn-secondary btn-sm" style="flex-shrink:0;margin-top:4px;">
        <i class="fa-solid fa-rotate-right fa-sm"></i> Refresh
      </button>
    </div>

    <!-- Matches grid -->
    <div class="row g-3" id="matchesContainer">
      <div class="col-12"><div class="spinner-wrap"><div class="spinner-ring"></div></div></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="script.js"></script>
</body>
</html>
