<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoomieMatch AI — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <span class="logo">🏠 RoomieMatch AI</span>
    <nav>
      <a href="index.html" class="active">Login</a>
      <a href="profile.html">Profile</a>
      <a href="matches.html">Matches</a>
    </nav>
  </nav>

  <!-- CARD -->
  <div class="card">
    <div class="card-header">
      <span class="icon">🔐</span>
      <h1>Welcome back</h1>
      <p>Sign in to find your perfect roommate</p>
    </div>

    <!-- ALERT -->
    <div class="alert" id="alert" role="alert"></div>

    <!-- FORM -->
    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" required />
      </div>

      <button class="btn btn-primary" type="submit" id="loginBtn">
        Sign In
      </button>
    </form>

    <div class="divider">or</div>

    <a href="#" id="signupLink" class="btn btn-outline">Create Account</a>

    <p class="footer-link" style="margin-top:16px">
      Don't have an account? <a href="#" id="switchLink">Sign up instead</a>
    </p>
  </div>

  <script src="script.js"></script>
  <script>
    redirectIfLoggedIn();

    const alert    = document.getElementById('alert');
    const form     = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const emailEl  = document.getElementById('email');
    const passEl   = document.getElementById('password');

    // Toggle between login / signup mode
    let isSignup = false;
    const signupLink  = document.getElementById('signupLink');
    const switchLink  = document.getElementById('switchLink');

    function setMode(signup) {
      isSignup = signup;
      const h1 = document.querySelector('.card-header h1');
      const p  = document.querySelector('.card-header p');
      if (signup) {
        h1.textContent = 'Create Account';
        p.textContent  = 'Join and find your perfect roommate';
        loginBtn.textContent = 'Sign Up';
        signupLink.textContent = 'Back to Login';
        switchLink.textContent = 'Log in instead';
      } else {
        h1.textContent = 'Welcome back';
        p.textContent  = 'Sign in to find your perfect roommate';
        loginBtn.textContent = 'Sign In';
        signupLink.textContent = 'Create Account';
        switchLink.textContent = 'Sign up instead';
      }
    }

    signupLink.addEventListener('click', (e) => { e.preventDefault(); setMode(!isSignup); });
    switchLink.addEventListener('click', (e) => { e.preventDefault(); setMode(!isSignup); });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = emailEl.value.trim();
      const password = passEl.value.trim();

      if (!email || !password) {
        showAlert(alert, 'error', 'Please fill in all fields.');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = isSignup ? 'Signing up…' : 'Signing in…';

      const endpoint = isSignup ? '/auth/signup' : '/auth/login';

      try {
        const res  = await fetch(`${API_BASE}${endpoint}`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password })
        });
        const json = await res.json();

        if (!res.ok) {
          showAlert(alert, 'error', json.message || 'Something went wrong.');
          return;
        }

        if (isSignup) {
          showAlert(alert, 'success', 'Account created! You can now log in.');
          setMode(false);
        } else {
          setToken(json.data);                     // store JWT
          window.location.href = 'profile.html';  // redirect
        }
      } catch (err) {
        showAlert(alert, 'error', 'Connection error. Is the backend running?');
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = isSignup ? 'Sign Up' : 'Sign In';
      }
    });
  </script>
</body>
</html>
