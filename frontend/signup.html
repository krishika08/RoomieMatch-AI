<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RoomieMatch AI — Create Account</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  
  <link href="style.css" rel="stylesheet">

  <style>
    /* =========================================
       PREMIUM SAAS LOGIN REDESIGN
       ========================================= */
    :root {
      --brand-primary: #4F46E5;
      --brand-primary-hover: #4338CA;
      --brand-gradient: linear-gradient(135deg, #4F46E5 0%, #818CF8 100%);
      --text-dark: #0F172A;
      --text-muted: #64748B;
      --glass-bg: rgba(255, 255, 255, 0.75);
      --glass-border: rgba(255, 255, 255, 0.6);
      --glass-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
    }

    body.auth-page {
      margin: 0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      overflow: hidden;
      background: #F8FAFC;
    }

    .split-layout {
      display: flex;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* LEFT SIDE: BRANDING & BLOBS */
    .split-left {
      flex: 1.2;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 5rem 6rem;
      background: linear-gradient(135deg, #EEF2FF 0%, #F8FAFC 100%);
      overflow: hidden;
      z-index: 1;
    }

    .blob {
      position: absolute;
      filter: blur(80px);
      border-radius: 50%;
      z-index: -1;
      opacity: 0.6;
      animation: float-blob 12s ease-in-out infinite alternate;
    }

    .blob-1 {
      top: -10%; left: -10%;
      width: 600px; height: 600px;
      background: #C7D2FE;
    }

    .blob-2 {
      bottom: -15%; right: 10%;
      width: 500px; height: 500px;
      background: #FBCFE8;
      animation-delay: -4s;
    }

    .blob-3 {
      top: 30%; right: -20%;
      width: 400px; height: 400px;
      background: #E0E7FF;
      animation-delay: -8s;
    }

    @keyframes float-blob {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(30px, 40px) scale(1.05); }
      100% { transform: translate(-20px, -30px) scale(0.95); }
    }

    .brand-content {
      max-width: 600px;
    }

    .brand-logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--brand-primary);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      letter-spacing: -0.5px;
    }

    .brand-tagline {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1.5px;
      background: linear-gradient(to right, #1E1B4B, #4F46E5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.5rem;
    }

    .brand-subtitle {
      font-size: 1.25rem;
      color: var(--text-muted);
      line-height: 1.6;
      font-weight: 400;
      max-width: 500px;
    }

    /* RIGHT SIDE: GLASS CARD */
    .split-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      position: relative;
      background: transparent;
      z-index: 2;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: 24px;
      padding: 3rem;
      width: 100%;
      max-width: 480px;
      transform-origin: center;
      animation: scale-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      max-height: 90vh;
      overflow-y: auto;
    }

    @keyframes scale-in {
      0%   { opacity: 0; transform: scale(0.95) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .card-header {
      margin-bottom: 2rem;
    }

    .card-header h2 {
      font-size: 2.25rem;
      font-weight: 800;
      background: linear-gradient(135deg, #0F172A 0%, #4F46E5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0 0 0.5rem 0;
      letter-spacing: -1px;
    }

    .card-header p {
      color: var(--text-muted);
      margin: 0;
      font-size: 1rem;
    }

    /* Floating Inputs */
    .form-group {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .input-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      background: #F1F5F9;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.3s ease;
      z-index: 2;
      font-size: 1rem;
    }

    .floating-input {
      width: 100%;
      padding: 1.5rem 1.25rem 0.5rem 3.75rem;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      color: var(--text-dark);
      border: 1.5px solid #E2E8F0;
      border-radius: 16px;
      background: #F8FAFC;
      outline: none;
      transition: all 0.3s ease;
      box-sizing: border-box;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.01), 0 4px 12px rgba(0,0,0,0.03);
      appearance: none;
    }

    /* Dropdown arrow custom for floating select */
    select.floating-input {
      background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath fill='none' stroke='%236B7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3E%3C/svg%3E");
      background-position: right 1.25rem center;
      background-repeat: no-repeat;
      background-size: 16px 12px;
      padding-right: 3rem;
    }

    .floating-input:hover {
      border-color: #CBD5E1;
      background: #FFFFFF;
      box-shadow: 0 6px 16px rgba(0,0,0,0.05);
    }

    .floating-input:focus {
      background: #FFFFFF;
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15), 0 4px 12px rgba(79, 70, 229, 0.1);
    }

    .floating-input:focus ~ .input-icon {
      color: var(--brand-primary);
      background: #EEF2FF;
      box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1);
    }

    .floating-label {
      position: absolute;
      left: 3.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1rem;
      pointer-events: none;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 2;
      margin: 0;
    }

    .floating-input:focus ~ .floating-label,
    .floating-input:not(:placeholder-shown) ~ .floating-label,
    select.floating-input ~ .floating-label {
      top: 0.75rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--brand-primary);
    }

    /* Pill Button */
    .btn-pill {
      width: 100%;
      padding: 1.125rem;
      border-radius: 50px;
      border: none;
      background: var(--brand-gradient);
      color: white;
      font-size: 1.125rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 8px 20px -6px rgba(79, 70, 229, 0.5);
      margin-top: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .btn-pill::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
      transform: rotate(30deg) translateX(-100%);
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
    }

    .btn-pill:hover::after {
      transform: rotate(30deg) translateX(100%);
    }

    .btn-pill:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 25px -6px rgba(79, 70, 229, 0.6);
    }

    .btn-pill:active {
      transform: translateY(1px);
      box-shadow: 0 4px 10px -4px rgba(79, 70, 229, 0.5);
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--brand-primary);
      text-decoration: none;
      font-weight: 600;
    }
    .auth-footer a:hover {
      text-decoration: underline;
    }

    .form-control { border: none; box-shadow: none; }
    
    @media (max-width: 992px) {
      .split-layout { flex-direction: column; }
      .split-left { padding: 3rem 2rem; flex: none; align-items: center; text-align: center; }
      .brand-tagline { font-size: 2.5rem; }
      .split-right { padding: 2rem; }
    }
  </style>
</head>
<body class="auth-page">

  <div class="split-layout">
    
    <!-- LEFT: BRANDING & BLOBS -->
    <div class="split-left">
      <!-- Animated background blobs -->
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>

      <div class="brand-content" data-aos="fade-right" data-aos-duration="1000">
        <div class="brand-logo">
          <img src="logo.jpeg" alt="RoomieMatch AI" style="height: 56px; width: auto; object-fit: contain;"> RoomieMatch AI
        </div>
        <h1 class="brand-tagline">Create your perfect living experience.</h1>
        <p class="brand-subtitle">Join thousands of students using our AI engine to find roommates who share their lifestyle and study habits.</p>
      </div>
    </div>

    <!-- RIGHT: GLASS CARD FORM -->
    <div class="split-right">
      <div class="glass-card">
        
        <div class="card-header">
          <h2>Create Account</h2>
          <p>Get started for free — no credit card needed.</p>
        </div>

        <form id="signupForm" novalidate>
          
          <div class="form-group">
            <input type="email" id="regEmail" class="floating-input" placeholder=" " required autocomplete="email">
            <i class="fa-regular fa-envelope input-icon"></i>
            <label class="floating-label" for="regEmail">University Email</label>
          </div>

          <div class="form-group">
            <input type="password" id="regPassword" class="floating-input" placeholder=" " required autocomplete="new-password" minlength="8">
            <i class="fa-solid fa-lock input-icon"></i>
            <label class="floating-label" for="regPassword">Password</label>
          </div>

          <div class="form-group">
            <select id="regOrganization" class="floating-input" required>
              <option value=""></option>
              <option value="UPES">UPES</option>
            </select>
            <i class="fa-solid fa-building-columns input-icon"></i>
            <label class="floating-label" for="regOrganization">Organization</label>
          </div>

          <div class="form-group">
            <select id="regHostel" class="floating-input" required>
              <option value=""></option>
              <option value="BIDHOLI_BOYS_HOSTEL">Bidholi Boys Hostel</option>
              <option value="BIDHOLI_GIRLS_HOSTEL">Bidholi Girls Hostel</option>
            </select>
            <i class="fa-solid fa-hotel input-icon"></i>
            <label class="floating-label" for="regHostel">Hostel</label>
          </div>

          <button type="submit" class="btn-pill" id="signupBtn">
            <i class="fa-solid fa-user-plus btn-icon"></i> Create account 
          </button>
          
        </form>

        <div class="auth-footer">
          Already have an account? <a href="index.html">Sign in &rarr;</a>
        </div>

      </div>
    </div>
    
  </div>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>
  <script src="script.js"></script>
</body>
</html>
