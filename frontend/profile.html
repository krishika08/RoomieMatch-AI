<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Profile — RoomieMatch AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
<div class="app-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fa-solid fa-house-chimney"></i></div>
      <span class="brand-name">RoomieMatch AI</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
      <a href="profile.html"   class="nav-item active"><i class="fa-solid fa-user-pen"></i> Profile</a>
      <a href="matches.html"   class="nav-item"><i class="fa-solid fa-handshake"></i> Matches</a>
      <a href="requests.html"  class="nav-item"><i class="fa-solid fa-bell"></i> Requests</a>
      <div class="nav-divider"></div>
      <a href="#" class="nav-item nav-logout" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Sign out</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="sidebarAvatar">U</div>
        <span class="user-email" id="sidebarEmail">user@app.com</span>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header" data-aos="fade-down" data-aos-duration="400">
      <h1>Living Preferences</h1>
      <p>These preferences power the AI matching engine. Fill all fields for best results.</p>
    </div>

    <div style="max-width:600px;" data-aos="fade-up" data-aos-delay="60">
      <form id="profileForm" class="card" style="padding:1.75rem;" novalidate>

        <div style="margin-bottom:1.5rem;">
          <div class="section-label"><i class="fa-solid fa-moon fa-xs"></i> Sleep &amp; Cleanliness</div>
          <div class="form-row">
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label" for="sleepSchedule">Sleep schedule</label>
              <select id="sleepSchedule" class="form-select" required>
                <option value="">Choose…</option>
                <option value="EARLY_BIRD">Early Bird (before 10 PM)</option>
                <option value="NIGHT_OWL">Night Owl (after midnight)</option>
                <option value="FLEXIBLE">Flexible</option>
              </select>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label" for="cleanlinessLevel">Cleanliness level</label>
              <select id="cleanlinessLevel" class="form-select" required>
                <option value="">Choose…</option>
                <option value="VERY_CLEAN">Very Clean</option>
                <option value="MODERATE">Moderate</option>
                <option value="RELAXED">Relaxed</option>
              </select>
            </div>
          </div>
        </div>

        <div style="margin-bottom:1.5rem;">
          <div class="section-label"><i class="fa-solid fa-users fa-xs"></i> Social &amp; Noise</div>
          <div class="form-row">
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label" for="noiseTolerance">Noise tolerance</label>
              <select id="noiseTolerance" class="form-select" required>
                <option value="">Choose…</option>
                <option value="SILENT">Silent</option>
                <option value="MODERATE">Moderate</option>
                <option value="LOUD_OK">Loud is OK</option>
              </select>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label" for="socialLevel">Social level</label>
              <select id="socialLevel" class="form-select" required>
                <option value="">Choose…</option>
                <option value="INTROVERT">Introvert</option>
                <option value="AMBIVERT">Ambivert</option>
                <option value="EXTROVERT">Extrovert</option>
              </select>
            </div>
          </div>
        </div>

        <div style="margin-bottom:1.5rem;">
          <div class="section-label"><i class="fa-solid fa-book-open fa-xs"></i> Study &amp; Guests</div>
          <div class="form-row">
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label" for="studyHabits">Study habits</label>
              <select id="studyHabits" class="form-select" required>
                <option value="">Choose…</option>
                <option value="IN_ROOM">Study in room</option>
                <option value="LIBRARY">Library / outside</option>
                <option value="FLEXIBLE">Flexible</option>
              </select>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label" for="guestFrequency">Guest frequency</label>
              <select id="guestFrequency" class="form-select" required>
                <option value="">Choose…</option>
                <option value="RARELY">Rarely</option>
                <option value="SOMETIMES">Sometimes</option>
                <option value="OFTEN">Often</option>
              </select>
            </div>
          </div>
        </div>

        <div style="margin-bottom:1.75rem;">
          <div class="section-label"><i class="fa-solid fa-temperature-half fa-xs"></i> Temperature</div>
          <div style="max-width:50%;">
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label" for="roomTemperature">Room temperature preference</label>
              <select id="roomTemperature" class="form-select" required>
                <option value="">Choose…</option>
                <option value="COOL">Cool (below 22°C)</option>
                <option value="MODERATE">Moderate (22–25°C)</option>
                <option value="WARM">Warm (above 25°C)</option>
              </select>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="saveProfileBtn">
          <i class="fa-solid fa-floppy-disk fa-sm"></i> Save preferences
        </button>

      </form>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="script.js"></script>
</body>
</html>
