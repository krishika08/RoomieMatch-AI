<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RoomieMatch AI</title>
</head>
<body>
    <div class="login-container">
        <main class="login-card">
            <header>
                <h1>RoomieMatch AI</h1>
                <p>Sign in to your account</p>
            </header>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="input-field" placeholder="email@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="input-field" placeholder="Enter your password" required>
                </div>

                <button type="submit" id="loginBtn" class="login-button">
                    Login
                </button>
            </form>

            <footer>
                <p>Don't have an account? <a href="signup.html">Sign up</a></p>
            </footer>
        </main>
    </div>

    <!-- Core Logic -->
    <script src="script.js"></script>
</body>
</html>
