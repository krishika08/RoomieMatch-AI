spring.application.name=roomiematch-ai

# ─────────────────────────────────────────────
# DATABASE CONFIGURATION
# ─────────────────────────────────────────────
# Using H2 for immediate testing since MySQL service was not found locally.
# Switch to MySQL for production by uncommenting the MySQL section below.

# --- H2 (In-Memory) ---
spring.datasource.url=jdbc:h2:mem:roomiematch;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- MySQL (Production/Demo) ---
# spring.datasource.url=jdbc:mysql://localhost:3306/roomiematch?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ─────────────────────────────────────────────
# JPA / Hibernate Configuration
# ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─────────────────────────────────────────────
# Actuator
# ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ─────────────────────────────────────────────
# JWT Configuration
