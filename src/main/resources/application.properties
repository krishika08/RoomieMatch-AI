spring.application.name=roomiematch-ai

# ─────────────────────────────────────────────
# MySQL Database Configuration (Railway Cloud)
# ─────────────────────────────────────────────
# NOTE: If you are connecting from your local PC, you likely need the PUBLIC host and port 
# from the Railway "Connect" tab (e.g., viaduct.proxy.rlwy.net).
spring.datasource.url=jdbc:mysql://mysql.railway.internal:3306/railway?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=IOlfuANxPgdpMwRZvtMRAWKHnRRhSaVF
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─────────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─────────────────────────────────────────────
# Actuator
# ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

